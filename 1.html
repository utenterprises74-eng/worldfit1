<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WorldFit Store</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f5f5f5;
}

header{
background:#111;
color:white;
text-align:center;
padding:20px;
}

.products{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:20px;
padding:20px;
}

.card{
width:260px;
background:white;
border-radius:10px;
overflow:hidden;
box-shadow:0 2px 10px rgba(0,0,0,.1);
}

.card img{
width:100%;
height:200px;
object-fit:cover;
}

.card-content{
padding:15px;
}

.price{
font-size:22px;
font-weight:bold;
color:green;
margin:10px 0;
}

.add-btn{
width:100%;
padding:10px;
border:none;
background:#28a745;
color:white;
cursor:pointer;
border-radius:5px;
}

.cart{
max-width:800px;
margin:20px auto;
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 2px 10px rgba(0,0,0,.1);
}

.cart h2{
margin-bottom:15px;
}

#cartItems{
margin-bottom:15px;
line-height:1.8;
}

#total{
margin-bottom:15px;
}

input,textarea{
width:100%;
padding:12px;
margin-top:10px;
border:1px solid #ccc;
border-radius:5px;
}

.whatsapp{
width:100%;
padding:12px;
border:none;
background:#25D366;
color:white;
font-size:16px;
margin-top:15px;
cursor:pointer;
border-radius:5px;
}

footer{
text-align:center;
padding:20px;
color:#777;
}
</style>
</head>

<body>

<header>
<h1>WorldFit Store</h1>
<p>Order Your Favorite Products</p>
</header>

<div class="products">

<div class="card">
<img src="images/gameconsole.jpg" alt="Retro Game Console">
<div class="card-content">
<h3>Retro Game Console</h3>
<div class="price">₹899</div>
<button class="add-btn"
onclick="addToCart('Retro Game Console',899)">
Add To Cart
</button>
</div>
</div>

<div class="card">
<img src="images/neckband.jpg" alt="Neckband">
<div class="card-content">
<h3>Bluetooth Neckband</h3>
<div class="price">₹499</div>
<button class="add-btn"
onclick="addToCart('Bluetooth Neckband',499)">
Add To Cart
</button>
</div>
</div>

<div class="card">
<img src="images/pillow.jpg" alt="Baby Pillow">
<div class="card-content">
<h3>Baby Pillow</h3>
<div class="price">₹299</div>
<button class="add-btn"
onclick="addToCart('Baby Pillow',299)">
Add To Cart
</button>
</div>
</div>

</div>

<div class="cart">

<h2>Checkout</h2>

<div id="cartItems">
No products added.
</div>

<h3 id="total">Total: ₹0</h3>

<form id="checkoutForm">

<input
type="text"
id="name"
placeholder="Full Name"
required>

<input
type="tel"
id="mobile"
placeholder="Mobile Number"
pattern="[0-9]{10}"
maxlength="10"
required>

<textarea
id="address"
placeholder="Full Address"
rows="4"
required></textarea>

<input
type="text"
id="city"
placeholder="City"
required>

<input
type="text"
id="state"
placeholder="State"
required>

<input
type="text"
id="pincode"
placeholder="Pincode"
pattern="[0-9]{6}"
maxlength="6"
required>

<button
type="submit"
class="whatsapp">
Place Order on WhatsApp
</button>

</form>

</div>

<footer>
© 2026 WorldFit Store
</footer>

<script>

let cart = [];
let total = 0;

function addToCart(product, price){

cart.push(product + " - ₹" + price);

total += price;

document.getElementById("cartItems").innerHTML =
cart.join("<br>");

document.getElementById("total").innerHTML =
"Total: ₹" + total;
}

document
.getElementById("checkoutForm")
.addEventListener("submit", function(e){

e.preventDefault();

if(cart.length === 0){
alert("Please add at least one product.");
return;
}

let name =
document.getElementById("name").value;

let mobile =
document.getElementById("mobile").value;

let address =
document.getElementById("address").value;

let city =
document.getElementById("city").value;

let state =
document.getElementById("state").value;

let pincode =
document.getElementById("pincode").value;

let message =
`🛒 NEW ORDER

Name: ${name}

Mobile: ${mobile}

Address:
${address}

City: ${city}

State: ${state}

Pincode: ${pincode}

Products:
${cart.join("\n")}

Total Amount: ₹${total}`;

let phone = "919654878484";  // अपना नंबर डालें

let url =
"https://wa.me/" +
phone +
"?text=" +
encodeURIComponent(message);

window.open(url,"_blank");

});

</script>

</body>
</html>
